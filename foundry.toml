[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

# Deep fuzzing/invariant profile: run with `FOUNDRY_PROFILE=intense forge test`
[profile.intense.fuzz]
runs = 2000

[profile.intense.invariant]
runs = 512
depth = 64

# Robinhood Chain (Arbitrum Orbit L2). ETH is the native gas token.
[rpc_endpoints]
robinhood = "https://rpc.mainnet.chain.robinhood.com"

[etherscan]
robinhood = { key = "${BLOCKSCOUT_API_KEY}", url = "https://robinhoodchain.blockscout.com/api", chain = 4663 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
